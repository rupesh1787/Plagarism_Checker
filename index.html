<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plagiarism Detector</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    .container {
        background: white;
        padding: 30px;
        width: min(780px, 100%);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        animation: fadeIn 0.8s ease-in-out;
    }

    h1 {
        margin-bottom: 5px;
        color: #2c3e50;
    }

    .dynamic-text {
        color: #6c757d;
        font-size: 14px;
        margin-bottom: 20px;
        height: 20px;
    }

    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
    }

    .tab {
        flex: 1;
        padding: 11px 12px;
        border: 1px solid #cfd8dc;
        border-radius: 10px;
        background: #f7f9fb;
        color: #34495e;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s ease;
    }

    .tab.active {
        background: #16a085;
        color: white;
        border-color: #16a085;
    }

    .panel {
        display: none;
    }

    .panel.active {
        display: block;
    }

    textarea {
        width: 100%;
        height: 120px;
        margin-bottom: 15px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        resize: none;
        font-size: 14px;
    }

    .field-label {
        display: block;
        font-size: 13px;
        margin-bottom: 7px;
        color: #34495e;
        font-weight: 600;
    }

    .file-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 10px;
        margin-bottom: 14px;
        background: #fbfcfd;
    }

    button {
        background: #16a085;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #138d75;
        transform: scale(1.03);
    }

    button:disabled {
        cursor: not-allowed;
        opacity: 0.8;
        transform: none;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        font-weight: bold;
        display: none;
    }

    .success {
        background: #d4edda;
        color: #155724;
    }

    .danger {
        background: #f8d7da;
        color: #721c24;
    }

    .stats {
        margin-top: 10px;
        font-size: 14px;
        color: #2c3e50;
        text-align: left;
        display: none;
    }

    .loading {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.7);
        border-top-color: white;
        border-radius: 50%;
        margin-right: 8px;
        vertical-align: middle;
        animation: spin 0.8s linear infinite;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(10px);}
        to {opacity: 1; transform: translateY(0);}
    }

    @keyframes spin {
        from {transform: rotate(0deg);}
        to {transform: rotate(360deg);}
    }

    @media (max-width: 640px) {
        .container {
            padding: 20px;
        }

        button {
            width: 100%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Plagiarism Detector</h1>
    <div class="dynamic-text" id="dynamicText"></div>

    <div class="tabs">
        <button type="button" class="tab active" id="textTab">Text Input</button>
        <button type="button" class="tab" id="pdfTab">PDF Upload</button>
    </div>

    <div class="panel active" id="textPanel">
        <textarea id="text1" placeholder="Enter original text..."></textarea>
        <textarea id="text2" placeholder="Enter suspected text..."></textarea>
        <button id="textCheckBtn" type="button">Detect from Text</button>
    </div>

    <div class="panel" id="pdfPanel">
        <h3 style="margin: 0 0 12px; color: #2c3e50;">Upload Documents</h3>
        <label class="field-label" for="file1">Upload Original PDF</label>
        <input class="file-input" id="file1" type="file" accept="application/pdf">

        <label class="field-label" for="file2">Upload Suspected PDF</label>
        <input class="file-input" id="file2" type="file" accept="application/pdf">

        <button id="pdfCheckBtn" type="button">Check PDF Plagiarism</button>
    </div>

    <div id="resultBox" class="result"></div>
    <div id="statsBox" class="stats"></div>
</div>

<script>
const messages = [
    "Analyzing meaning, not just words...",
    "Detect hidden similarities...",
    "Compare ideas, not sentences...",
    "AI is checking for duplication...",
    "Smart detection in progress..."
];

let i = 0;
setInterval(() => {
    document.getElementById("dynamicText").innerText = messages[i];
    i = (i + 1) % messages.length;
}, 2000);

const textTab = document.getElementById("textTab");
const pdfTab = document.getElementById("pdfTab");
const textPanel = document.getElementById("textPanel");
const pdfPanel = document.getElementById("pdfPanel");
const textCheckBtn = document.getElementById("textCheckBtn");
const pdfCheckBtn = document.getElementById("pdfCheckBtn");
const resultBox = document.getElementById("resultBox");
const statsBox = document.getElementById("statsBox");

function switchPanel(mode) {
    const textMode = mode === "text";
    textTab.classList.toggle("active", textMode);
    pdfTab.classList.toggle("active", !textMode);
    textPanel.classList.toggle("active", textMode);
    pdfPanel.classList.toggle("active", !textMode);
    resetOutput();
}

function resetOutput() {
    resultBox.style.display = "none";
    resultBox.className = "result";
    resultBox.innerText = "";
    statsBox.style.display = "none";
    statsBox.innerHTML = "";
}

function setLoading(button, loadingText) {
    button.disabled = true;
    button.dataset.oldText = button.innerText;
    button.innerHTML = '<span class="loading"></span>' + loadingText;
}

function clearLoading(button) {
    button.disabled = false;
    button.innerText = button.dataset.oldText || "Check";
}

function showResult(message, isSuccess, statsHtml) {
    resultBox.style.display = "block";
    resultBox.innerText = message;
    resultBox.className = "result " + (isSuccess ? "success" : "danger");

    if (statsHtml) {
        statsBox.innerHTML = statsHtml;
        statsBox.style.display = "block";
    } else {
        statsBox.style.display = "none";
    }
}

async function checkPlagiarism() {
    const text1 = document.getElementById("text1").value.trim();
    const text2 = document.getElementById("text2").value.trim();

    if (!text1 || !text2) {
        showResult("Please enter both texts", false);
        return;
    }

    setLoading(textCheckBtn, "Analyzing Text...");
    showResult("Analyzing text input...", true);

    try {
        const response = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text1, text2 })
        });

        const data = await response.json();
        if (!response.ok) {
            showResult(data.error || "Request failed", false);
            return;
        }

        showResult(data.result, data.result.includes("No"));

    } catch (error) {
        showResult("Error connecting to server", false);
    } finally {
        clearLoading(textCheckBtn);
    }
}

async function checkPdfPlagiarism() {
    const file1 = document.getElementById("file1").files[0];
    const file2 = document.getElementById("file2").files[0];

    if (!file1 || !file2) {
        showResult("Please upload both PDF files", false);
        return;
    }

    const formData = new FormData();
    formData.append("file1", file1);
    formData.append("file2", file2);

    setLoading(pdfCheckBtn, "Checking PDFs...");
    showResult("Extracting and analyzing PDF content...", true);

    try {
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        if (!response.ok) {
            showResult(data.error || "PDF upload failed", false);
            return;
        }

        const statsHtml = "Document 1 words: " + data.length1 + "<br>Document 2 words: " + data.length2;
        showResult(data.result, data.result.includes("No"), statsHtml);
    } catch (error) {
        showResult("Error connecting to server", false);
    } finally {
        clearLoading(pdfCheckBtn);
    }
}

textTab.addEventListener("click", () => switchPanel("text"));
pdfTab.addEventListener("click", () => switchPanel("pdf"));
textCheckBtn.addEventListener("click", checkPlagiarism);
pdfCheckBtn.addEventListener("click", checkPdfPlagiarism);
</script>

</body>
</html>
